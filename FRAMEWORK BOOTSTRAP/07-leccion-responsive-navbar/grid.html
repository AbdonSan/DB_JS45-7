<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio: CSS Grid</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="grid.css">
</head>

<body>

    <h1>CSS Grid</h1>
    <p class="instruccion">Grid permite crear layouts de filas Y columnas al mismo tiempo.</p>

    <!-- Ejemplo Grid: layout de pagina -->
    <section>
        <h2>Layout de pagina con Grid</h2>
        <div class="grid-layout">
            <div class="caja header">Header</div>
            <div class="caja sidebar">Sidebar</div>
            <div class="caja contenido">Contenido principal</div>
            <div class="caja footer">Footer</div>
        </div>
    </section>

    <!-- Ejemplo Grid: galeria -->
    <section>
        <h2>Galeria con Grid</h2>
        <div class="grid-galeria">
            <div class="caja caja-1">1</div>
            <div class="caja caja-2">2</div>
            <div class="caja caja-3">3</div>
            <div class="caja caja-4">4</div>
            <div class="caja caja-1">5</div>
            <div class="caja caja-2">6</div>
        </div>
    </section>

</body>

</html>
