<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio: Flexbox</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="flexbox.css">
</head>

<body>

    <h1>Flexbox</h1>
    <p class="instruccion">Redimensiona la ventana del navegador para ver como cambia el layout.</p>

    <!-- Ejemplo Flexbox: fila en desktop, columna en movil -->
    <section>
        <h2>Contenedor Flex basico</h2>
        <p>Los elementos se acomodan en fila o columna segun el tamano de pantalla.</p>

        <div class="flex-container">
            <div class="caja caja-1">Caja 1</div>
            <div class="caja caja-2">Caja 2</div>
            <div class="caja caja-3">Caja 3</div>
        </div>
    </section>

    <!-- Ejemplo Flexbox: centrado -->
    <section>
        <h2>Centrado con Flexbox</h2>
        <div class="flex-centrado">
            <div class="caja caja-4">Estoy centrado</div>
        </div>
    </section>

    <!-- Ejemplo Flexbox: space-between -->
    <section>
        <h2>Distribucion con space-between</h2>
        <div class="flex-between">
            <div class="caja caja-1">Inicio</div>
            <div class="caja caja-2">Centro</div>
            <div class="caja caja-3">Final</div>
        </div>
    </section>

</body>

</html>
