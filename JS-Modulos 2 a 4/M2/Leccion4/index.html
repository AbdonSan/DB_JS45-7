<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Stark Industries</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <link rel="stylesheet" href="ASSETS/CSS/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">STARK INDUSTRIES</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Armaduras</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">I.A. (JARVIS)</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="container my-5 text-center">
        <h1 class="display-4 fw-bold">TONY STARK</h1>
        <p class="lead">Genio, millonario, playboy, filántropo y desarrollador Junior.</p>
        <hr>
    </header>

    <main class="container">
        <section class="row g-4 galeria-stark">
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card">
                    <img src="ASSETS/IMG/mark1.jpg" class="card-img-top img-proyecto" alt="Prototipo Mark 1">
                    <div class="card-body">
                        <p class="card-text text-center">Prototipo Mark 1</p>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card">
                    <img src="ASSETS/IMG/reactor.jpg" class="card-img-top img-proyecto" alt="Reactor ARC">
                    <div class="card-body">
                        <p class="card-text text-center">Reactor ARC</p>
                    </div>
                </div>
            </div>
            </section>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 Stark Industries - Proyecto Educativo</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.bundle.min.js"></script>
</body>
</html>
