<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conteo de Vocales – Lección 5</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #fafafa;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            color: #555;
        }
        #palabras {
            background-color: #eaf4fb;
            border-left: 4px solid #3498db;
            padding: 16px;
            margin-top: 20px;
        }
        #resultado {
            background-color: #f0faf0;
            border-left: 4px solid #2ecc71;
            padding: 16px;
            margin-top: 12px;
            font-size: 1.1em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Conteo de Vocales en Palabras</h1>
    <p>Al abrir esta página se te pedirá cuántas palabras deseas ingresar. El programa contará el total de vocales en todas las palabras.</p>

    <!-- Lista de palabras ingresadas -->
    <div id="palabras"></div>

    <!-- Total de vocales encontradas -->
    <div id="resultado"></div>

    <script src="app.js"></script>
</body>
</html>
