<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Adivina el Número – Lección 4</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #fafafa;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            color: #555;
        }
        #historial {
            background-color: #eaf4fb;
            border-left: 4px solid #3498db;
            padding: 16px;
            margin-top: 24px;
            font-size: 1em;
            min-height: 60px;
        }
        #resultado {
            background-color: #f0faf0;
            border-left: 4px solid #2ecc71;
            padding: 16px;
            margin-top: 12px;
            font-size: 1.1em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🎯 Adivina el Número</h1>
    <p>El computador eligió un número del <strong>1 al 10</strong>. Tienes <strong>3 intentos</strong> para adivinarlo.</p>
    <p>Reglas: no puedes repetir un número ya usado, y solo se aceptan valores entre 1 y 10.</p>

    <!-- Aquí se mostrará el historial de intentos -->
    <div id="historial">Aún no has ingresado ningún número.</div>

    <!-- Aquí aparecerá el mensaje final (ganaste o perdiste) -->
    <div id="resultado"></div>

    <script src="app.js"></script>
</body>
</html>
